<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate PDF Converter</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #2c3e50; margin-bottom: 24px; }
        .upload-box { border: 2px dashed #3498db; padding: 20px; border-radius: 10px; margin-bottom: 20px; background: #ebf5fb; cursor: pointer; }
        .btn-stack { display: flex; flex-direction: column; gap: 10px; }
        button { background: #3498db; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2980b9; }
        button:disabled { background: #bdc3c7; }
        #status { margin-top: 20px; font-size: 14px; font-weight: bold; }
        .loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h1>PDF Converter</h1>
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <span id="fileName">Select PDF File</span>
        <input type="file" id="fileInput" hidden accept=".pdf" onchange="updateName()">
    </div>

    <div class="btn-stack">
        <button onclick="process('img')">Save as PNG Image</button>
        <button onclick="process('xlsx')">Save as Excel (XLSX)</button>
        <button onclick="process('docx')">Save as Word (DOCX)</button>
    </div>

    <div class="loader" id="loader"></div>
    <div id="status"></div>
</div>

<script>
    function updateName() {
        const file = document.getElementById('fileInput').files[0];
        document.getElementById('fileName').innerText = file ? file.name : "Select PDF File";
    }

    async function process(fmt) {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');

        if (!fileInput.files[0]) {
            status.innerText = "⚠️ Please select a file first.";
            status.style.color = "red";
            return;
        }

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('format', fmt);

        status.innerText = "Converting...";
        status.style.color = "#3498db";
        loader.style.display = "block";

        try {
            const resp = await fetch('/convert', { method: 'POST', body: formData });
            if (!resp.ok) throw new Error(await resp.text());

            const blob = await resp.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `output_${Date.now()}.${fmt === 'img' ? 'png' : fmt}`;
            a.click();
            status.innerText = "✅ Done!";
            status.style.color = "green";
        } catch (e) {
            status.innerText = "❌ " + e.message;
            status.style.color = "red";
        } finally {
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
